# Logistic Regression
logistic_regression:
  C: 1.0
  max_iter: 2000
  class_weight: "balanced"
  solver: "lbfgs"
  n_jobs: -1
  random_state: 42

# Gradient Boosting
gradient_boosting:
  max_iter: 500
  learning_rate: 0.05
  max_depth: 7
  min_samples_leaf: 50
  l2_regularization: 0.5
  class_weight: "balanced"
  early_stopping: true
  validation_fraction: 0.1
  n_iter_no_change: 30
  random_state: 42

# GPU Configuration
# use_gpu: true  -> auto-detect GPU, use LightGBM GPU if available
# use_gpu: false -> force CPU (sklearn HistGBM)
#
# VRAM guide for batch_size_mb:
#   4 GB VRAM -> 512
#   6 GB VRAM -> 1024   (RTX 3060)
#   8 GB VRAM -> 2048
#   12 GB VRAM -> 4096
gpu:
  use_gpu: true
  gpu_id: 0
  fallback_to_cpu: true
  max_vram_fraction: 0.85
  batch_size_mb: 1024
  clear_cache_between_tasks: true
  validate_input: true
  atomic_save: true
  min_disk_gb: 2.0

# Checkpoint / Resume (LightGBM GPU only)
# Press Ctrl+C to pause training at any time.
# Re-run notebook 04 to resume automatically from last checkpoint.
# To force fresh start: delete models/checkpoints/gb_{task}_checkpoint.txt
checkpoint:
  enabled: true
  checkpoint_every: 50
  resume: true

# Tasks
tasks:
  - name: "binary"
    label_col: "label_binary"
    n_classes: 2
  - name: "8class"
    label_col: "label_category"
    n_classes: 8
  - name: "34class"
    label_col: "label_fine"
    n_classes: 34

artifacts_dir: "models"
