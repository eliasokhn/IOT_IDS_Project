# Logistic Regression
logistic_regression:
  C: 1.0
  max_iter: 300
  class_weight: "balanced"
  solver: "lbfgs"
  n_jobs: -1
  random_state: 42

# Gradient Boosting
gradient_boosting:
  max_iter: 300
  learning_rate: 0.1
  max_depth: 6
  min_samples_leaf: 20
  l2_regularization: 0.1
  class_weight: "balanced"
  early_stopping: true
  validation_fraction: 0.1
  n_iter_no_change: 20
  random_state: 42

# GPU Configuration
# Set use_gpu: false to force CPU training (safe default).
# Set use_gpu: true to auto-detect GPU and use the best available backend.
#
# Backend priority (auto-selected):
#   1. cuML        - GPU LR + GBM  (requires RAPIDS)
#   2. LightGBM    - GPU GBM, CPU LR  (pip install lightgbm)
#   3. XGBoost     - GPU GBM, CPU LR  (pip install xgboost)
#   4. CPU only    - sklearn always works
#
# VRAM guide - set batch_size_mb to fit your GPU:
#   4 GB VRAM  (GTX 1650)    -> batch_size_mb: 512
#   6 GB VRAM  (RTX 3060)    -> batch_size_mb: 1024
#   8 GB VRAM  (RTX 3070)    -> batch_size_mb: 2048
#   12 GB VRAM (RTX 3080 Ti) -> batch_size_mb: 4096
#   24 GB VRAM (RTX 3090)    -> batch_size_mb: 8192
gpu:
  use_gpu: true
  gpu_id: 0
  fallback_to_cpu: true
  max_vram_fraction: 0.85
  batch_size_mb: 1024
  clear_cache_between_tasks: true
  validate_input: true
  atomic_save: true
  min_disk_gb: 2.0

# Tasks
tasks:
  - name: "binary"
    label_col: "label_binary"
    n_classes: 2
  - name: "8class"
    label_col: "label_category"
    n_classes: 8
  - name: "34class"
    label_col: "label_fine"
    n_classes: 34

artifacts_dir: "models"