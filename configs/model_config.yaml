# ── Logistic Regression ────────────────────────────────────────────────────────
logistic_regression:
  C: 1.0
  max_iter: 1000
  class_weight: "balanced"
  solver: "lbfgs"
  n_jobs: -1          # NOTE: set to 1 if GPU is active (avoid fork issues)
  random_state: 42

# ── Gradient Boosting ──────────────────────────────────────────────────────────
gradient_boosting:
  max_iter: 300
  learning_rate: 0.1
  max_depth: 6
  min_samples_leaf: 20
  l2_regularization: 0.1
  class_weight: "balanced"   # used by CPU path only; GPU path uses sample_weight
  early_stopping: true
  validation_fraction: 0.1
  n_iter_no_change: 20
  random_state: 42

# ── GPU Configuration ──────────────────────────────────────────────────────────
# Set use_gpu: false to force CPU training (safe default).
# Set use_gpu: true to auto-detect GPU and use the best available backend.
#
# Backend priority (auto-selected by detect_gpu()):
#   1. cuML        — GPU-accelerated LR + GBM (requires RAPIDS install)
#   2. LightGBM    — GPU-accelerated GBM, CPU LR (pip install lightgbm)
#   3. XGBoost     — GPU-accelerated GBM, CPU LR (pip install xgboost)
#   4. CPU only    — sklearn HistGBM + sklearn LR (always available)
#
# VRAM guidance — set batch_size_mb to fit your GPU:
#   4 GB VRAM  (GTX 1650, etc.)     → batch_size_mb: 512
#   6 GB VRAM  (RTX 3060, etc.)     → batch_size_mb: 1024
#   8 GB VRAM  (RTX 3070, etc.)     → batch_size_mb: 2048
#   12 GB VRAM (RTX 3080 Ti, etc.)  → batch_size_mb: 4096
#   24 GB VRAM (RTX 3090, etc.)     → batch_size_mb: 8192
gpu:
  use_gpu: true             # ← SET TO false TO FORCE CPU
  gpu_id: 0                 # which GPU to use (0 = first GPU)
  fallback_to_cpu: true     # auto-fallback on any GPU error — KEEP TRUE
  max_vram_fraction: 0.85   # never use more than 85% of VRAM
  batch_size_mb: 1024       # data chunk size for GPU transfer — adjust per VRAM
  clear_cache_between_tasks: true   # free VRAM between each of the 6 experiments
  validate_input: true      # check for NaN/Inf before GPU call — KEEP TRUE
  atomic_save: true         # safe checkpoint write (temp file + rename)
  min_disk_gb: 2.0          # require 2 GB free disk before saving

# ── Tasks ──────────────────────────────────────────────────────────────────────
tasks:
  - name: "binary"
    label_col: "label_binary"
    n_classes: 2
  - name: "8class"
    label_col: "label_category"
    n_classes: 8
  - name: "34class"
    label_col: "label_fine"
    n_classes: 34

artifacts_dir: "models"
