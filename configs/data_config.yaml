dataset:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  merged_parquet: "data/processed/merged.parquet"
  split_indices: "data/processed/split_indices.pkl"
  random_state: 42

  # Sampling strategy: "stratified" keeps real class proportions (better F1).
  # "balanced" uses floor/ceiling (available in loader.py but hurts F1).
  sample_mode: "stratified"
  sample_frac: 0.40
  balanced_floor: 2000
  balanced_ceiling: 80000

split:
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15
  stratify_on: "label_fine"

features:
  drop_cols:
    - "label"
    - "label_binary"
    - "label_category"
    - "label_fine"
  inf_fill_strategy: "col_max"
  nan_fill_strategy: "median"

label_columns:
  binary: "label_binary"
  category: "label_category"
  fine: "label_fine"
