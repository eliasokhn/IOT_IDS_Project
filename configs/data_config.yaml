dataset:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  merged_parquet: "data/processed/merged.parquet"
  split_indices: "data/processed/split_indices.pkl"
  sample_frac: 0.30          # use 30% per class — representative while manageable
  random_state: 42

split:
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15
  stratify_on: "label_fine"  # always split on 34-class labels

features:
  drop_cols:
    - "label"
    - "label_binary"
    - "label_category"
    - "label_fine"
  inf_fill_strategy: "col_max"   # replace inf with column max
  nan_fill_strategy: "median"    # fill NaN with column median

label_columns:
  binary: "label_binary"
  category: "label_category"
  fine: "label_fine"
